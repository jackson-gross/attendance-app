<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance Tracker — Login</title>
<!-- PWA / Home Screen -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Attendance">
<meta name="theme-color" content="#0D0F14">
<link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
<link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon-180.png">
<link rel="apple-touch-icon" sizes="152x152" href="/static/apple-touch-icon-152.png">
<link rel="apple-touch-icon" sizes="120x120" href="/static/apple-touch-icon-120.png">
<link rel="apple-touch-icon" sizes="76x76" href="/static/apple-touch-icon-76.png">
<link rel="icon" type="image/png" href="/static/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0D0F14; --surface: #161921; --surface2: #1E2230; --border: #2A2F3E;
    --accent: #5B7FFF; --accent2: #A78BFA; --text: #E8EAEF; --text-muted: #6B7280;
    --absent: #F87171; --font-display: 'Syne', sans-serif; --font-mono: 'DM Mono', monospace;
    --radius: 10px; --radius-sm: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg); color: var(--text); font-family: var(--font-display);
    min-height: 100dvh; display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px; opacity: 0.2; pointer-events: none;
  }
  .card {
    position: relative; background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: clamp(28px, 5vw, 48px) clamp(24px, 5vw, 40px);
    width: 100%; max-width: 400px; z-index: 1;
  }
  .logo { display: flex; align-items: center; gap: 12px; margin-bottom: 36px; justify-content: center; }
  .logo-icon { width: 44px; height: 44px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
  .logo-text { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
  .logo-text span { color: var(--accent); }
  h2 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
  .subtitle { font-size: 13px; color: var(--text-muted); margin-bottom: 32px; font-family: var(--font-mono); }
  .form-group { margin-bottom: 18px; }
  label { display: block; font-size: 11px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 7px; }
  input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    padding: 13px 14px; border-radius: var(--radius-sm); font-family: var(--font-display);
    font-size: 16px; /* 16px prevents iOS zoom */ outline: none; transition: border-color 0.15s;
  }
  input:focus { border-color: var(--accent); }
  input::placeholder { color: var(--text-muted); }
  .btn {
    width: 100%; padding: 14px; border-radius: var(--radius-sm); border: none;
    background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff;
    font-family: var(--font-display); font-size: 16px; font-weight: 700;
    cursor: pointer; margin-top: 8px; transition: opacity 0.15s, transform 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { opacity: 0.88; transform: scale(0.99); }
  .error {
    background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3);
    color: var(--absent); border-radius: var(--radius-sm); padding: 10px 14px;
    font-size: 13px; margin-bottom: 20px; display: none;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">📋</div>
    <div class="logo-text">Attend<span>ance</span></div>
  </div>
  <h2>Welcome back</h2>
  <p class="subtitle">Sign in to continue</p>
  <div class="error" id="errorMsg"></div>
  <div class="form-group">
    <label>Username</label>
    <input type="text" id="username" placeholder="admin" autocomplete="username" autocapitalize="none">
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
  </div>
  <button class="btn" onclick="doLogin()">Sign In</button>
</div>
<script>
  ['password','username'].forEach(id =>
    document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); })
  );
  async function doLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const errEl = document.getElementById('errorMsg');
    errEl.style.display = 'none';
    if (!username || !password) { showError('Please enter your username and password.'); return; }
    const res = await fetch('/api/auth/login', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ username, password })
    });
    if (res.ok) { window.location.href = '/'; }
    else { const d = await res.json(); showError(d.error || 'Login failed'); }
  }
  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg; el.style.display = 'block';
  }
</script>
</body>
</html>
